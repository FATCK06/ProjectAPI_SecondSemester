<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="login.css">
</head>

<body>
    <div class="box-login">
        <img src="../img/logo-akaer.png" alt="Logo Akaer" class="logo-img" />

        <h2 class="titulo-login">LOGIN</h2>
        <h3 class="subtitulo-login">Seja bem-vindo de volta!</h3>
        
        <label class="label-input">Nome de usuário:</label> 
        <input type="text" placeholder="Insira o seu nome de usuário" class="campo-login">
        
        <label class="label-input">Senha de acesso:</label> 
        <input type="password" placeholder="Insira a sua senha" class="campo-login2">
        
        <button class="botao-login">Conectar</button>
    </div>
</body>
</html>
